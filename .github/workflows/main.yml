name: Build Latest WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Archive WebDriverAgent
        run: |
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -archivePath build/WebDriverAgentRunner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ENTITLEMENTS="" \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO

      - name: Prepare IPA Package
        run: |
          mkdir -p Payload
          
          # 1. 因为跳过签名，.app 会出现在 Xcode 的私有派生数据目录里
          # 我们去 ~/Library/Developer/Xcode/DerivedData 下全量搜索
          echo "正在从系统缓存目录搜索编译产物..."
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 系统缓存中也未找到 .app 文件。"
            exit 1
          fi
          
          echo "成功捕获到 APP 路径: $APP_PATH"
          
          # 2. 拷贝到当前目录并打包
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-Latest-IPA
          path: WebDriverAgent.ipa
