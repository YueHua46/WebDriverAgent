name: Build Latest WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Archive WebDriverAgent
        run: |
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -archivePath build/WebDriverAgentRunner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ENTITLEMENTS="" \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO

      - name: Prepare IPA Package
        run: |
          # 1. 创建 Payload 目录
          mkdir -p Payload
          
          # 2. 【强化版搜索】在整个 build 目录下查找 .app 文件夹
          # 排除掉不相关的目录，只找我们需要的 Runner.app
          APP_PATH=$(find build -name "*Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 依然未找到 .app 文件。开始输出目录结构进行调试："
            ls -R build
            exit 1
          fi
          
          echo "成功找到 APP: $APP_PATH"
          
          # 3. 拷贝并压缩
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-Latest-IPA
          path: WebDriverAgent.ipa
