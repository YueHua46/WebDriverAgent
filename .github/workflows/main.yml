name: Build Latest WDA IPA

on:
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Archive WebDriverAgent
        run: |
          # 1. 执行归档命令，强制跳过所有签名检查
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -archivePath build/WebDriverAgentRunner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ENTITLEMENTS="" \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO

      - name: Prepare IPA Package
        run: |
          # 2. 创建标准的 IPA 目录结构
          mkdir -p Payload
          
          # 3. 动态查找生成的 .app 路径并拷贝
          # archive 模式下的标准路径通常在 Products/Applications 下
          APP_PATH=$(find build/WebDriverAgentRunner.xcarchive/Products/Applications -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未找到编译生成的 .app 文件"
            exit 1
          fi
          
          echo "正在打包 APP: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 4. 压缩为 IPA
          zip -r WebDriverAgent.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-Latest-IPA
          path: WebDriverAgent.ipa
